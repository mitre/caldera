# tox (https://tox.readthedocs.io/) is a tool for running tests
# in multiple virtualenvs. This configuration file will run the
# test suite on all supported python versions. To use it, "pip install tox"
# and then run "tox" from this directory.

[tox]
skipsdist = True
envlist =
    py{310,311,312,313}
    style
    coverage
    safety
    bandit
skip_missing_interpreters = true

[testenv]
description = run tests
deps =
    -rrequirements.txt
    virtualenv!=20.0.22
    pre-commit
    pytest
    pytest-asyncio==0.26.0
    pytest-aiohttp
    coverage
allowlist_externals = mkdir
commands =
    mkdir -p plugins/magma/dist/assets
    coverage run -p -m pytest --tb=short --asyncio-mode=auto --ignore=tests/e2e tests -vv

[testenv:style]
deps = pre-commit
skip_install = true
commands =
    pre-commit run --all-files --show-diff-on-failure

[testenv:coverage]
deps =
    coverage
skip_install = true
commands =
    coverage combine
    coverage html
    coverage report

[testenv:coverage-ci]
deps =
    coveralls
    coverage
skip_install = true
commands =
    coverage combine
    coverage xml
    coverage report

[testenv:safety]
# Safety ignore list:
# 39642: reportlab vuln resolved in https://github.com/mitre/debrief/pull/39
# 39659: aiohttp cannot be upgraded to 3.7.4: https://github.com/mitre/caldera/pull/2062
deps =
    safety
skip_install = true
whitelist_externals=find
commands =
    safety check -r requirements.txt --ignore 39642 --ignore 39659
    safety check -r requirements-dev.txt

[testenv:bandit]
deps =
    bandit
skip_install = true
commands =
    bandit -r app -ll --exclude=tests/ --skip=B303

[testenv:ui]
description =
    Run Playwright E2E UI tests against a live Caldera instance.
    Each run picks a free port and writes conf/local.yml automatically,
    so multiple VENVs can run in parallel without port conflicts.
    Requires Node.js to build the Magma frontend first (handled below via nodeenv).
deps =
    -rrequirements.txt
    -rrequirements-ui-tests.txt
    pytest
    pytest-asyncio==0.26.0
    pyyaml
allowlist_externals =
    bash
    nodeenv
    npm
    playwright
skip_install = true
commands =
    # 1. Install Node.js into this virtualenv via nodeenv (idempotent)
    nodeenv --node=20.11.0 --python-virtualenv --prebuilt --quiet
    # 2. Install Magma frontend dependencies and build the static assets
    bash -c "cd plugins/magma && npm ci --prefer-offline && npm run build"
    # 3. Install Playwright browser binaries (Chromium only for speed)
    playwright install chromium
    # 4. Run the E2E test suite
    pytest plugins/magma/tests/e2e --tb=short -v {posargs}
