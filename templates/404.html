<!DOCTYPE html>
<html>
<head>
    <title>404 - Page Not Found | R2Purple</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" type="image/png" href="/gui/img/favicon.png"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .error-container {
            max-width: 500px;
            padding: 40px;
        }
        .error-code {
            font-size: 120px;
            font-weight: 800;
            background: linear-gradient(135deg, #7B2FBE, #00E5FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        p {
            font-size: 16px;
            color: #8a8a9a;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .error-links {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .error-links a {
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #7B2FBE;
            color: #ffffff;
        }
        .btn-primary:hover {
            background: #8E3FD4;
        }
        .btn-outline {
            color: #ffffff;
            border: 1px solid #2a2a3e;
        }
        .btn-outline:hover {
            border-color: #00e5ff;
            color: #00e5ff;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <h1>Page Not Found</h1>
        <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
        <div class="error-links">
            <a href="/" class="btn-primary">Go Home</a>
            <a href="/pricing" class="btn-outline">View Pricing</a>
            <a href="/demo" class="btn-outline">Request Demo</a>
        </div>
    </div>
</body>
</html>
